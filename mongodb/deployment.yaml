apiVersion: apps/v1
kind: StatefulSet          # deployment diubah jdi statefulset
metadata:
  name: mongodb            # nama Deployment
  namespace: blog-app
spec:  
  serviceName: mongodb-headless
  replicas: 3
  selector:
    matchLabels:
      app: mongodb         # Label Pod yang akan dikelola StatefulSet
  template:
    metadata:
      labels:
        app: mongodb       # Label yang diberikan ke setiap Pod yang dibuat
    spec:
      serviceAccountName: mongodb-sa
      containers:
        - name: mongodb
          image: docker.io/library/mongo:7
          imagePullPolicy: Never
          command:
            - mongod
            - '--replSet'
            - 'rs0'
            - '--bind_ip_all'
          ports:
            - containerPort: 27017
          envFrom:
            - secretRef:
                name: mongodb-secret
          volumeMounts:
            - name: mongodb-volume
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
              - mongosh
              - --eval
              - "db.adminCommand('ping')"
            initialDelaySeconds: 15   # tunggu 15 detik setelah pod start baru readiness memulai pengecekan 
            periodSeconds: 10         # cek setiap 10 detik
            timeoutSeconds: 5         # kalau tidak ada response dalam 5 detik -> dianggap gagal
            failureThreshold: 3       # gagal 3x berturut turut -> pod dianggap tidak ready
          livenessProbe:
            exec:
              command:
              - mongosh
              - --eval
              - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m      # CPU minimum yang dijamin untuk container
              memory: 128Mi  # Memori minimum yang dijamin untuk container
            limits:
              cpu: 500m      # Batas maksimum penggunaan CPU
              memory: 512Mi  # Batas maksimum penggunaan memori

  volumeClaimTemplates:
    - metadata:
        name: mongodb-volume
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
